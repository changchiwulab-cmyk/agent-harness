  完全沒有對抗間接 prompt injection / 不受信任內容的機制。這是 2026 第一風險（OWASP LLM01）。
  本卡新增 system/INPUT_GUARDRAILS.md，並在 FAILURE_TAXONOMY / GATE_POLICY / research SKILL 接上 enforcement 點。
