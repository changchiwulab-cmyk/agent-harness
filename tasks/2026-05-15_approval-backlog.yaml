# === 任務定義 ===
goal: "提供 approval backlog 可視化（待簽核 Task Card + 草稿 + 已核准統計 + 等待天數）與批次核准『記錄』工具，保留人工簽核、不自動核准，與既有 logs/approvals/ schema 及 RETRO_FLOW 對齊"

context: |
  依已核准計畫 ticklish-dazzling-crescent.md Phase 2，承接 Phase 0/1
  （20260515-003/004 已 done，APR-20260515-001/002）。痛點：待人工核准的
  backlog（outputs/drafts/、status=review 且 approval_needed 的卡、
  logs/approvals/）沒有彙整視圖，易積壓且不可見（0515-002 審查：drafts
  24:reports 2、18/35 卡塞 review）。
  計畫定調「可視化 + 批次人工核准，不自動核准，人工簽核保留」。故：
   - 掃描器：列出「pending 簽核」= approval_needed:true 且 status=review 且
     logs/approvals/ 無對應 task_id；附等待天數；草稿與已核准為輔助統計。
   - 批次記錄器：--approve 由『操作者』執行以記錄一批人工決策，沿用
     Phase 0/1 的 approval log schema（APR-YYYYMMDD-NNN，sequential），
     已存在則拒絕重複；不翻 Task Card 狀態（狀態轉換仍為獨立明確動作）。
  Agent 僅在轉達明確人工批次決策時才呼叫 --approve（與 Phase 0/1 現行流程
  一致：人在對話核准 → 記錄 approval log）。純 scripts/+logs/+drafts/+
  1 個 CI 測試 step；無 system/、.claude/ 變更。可逆。

