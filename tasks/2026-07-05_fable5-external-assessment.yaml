  使用者要求對專案評分、抓缺點、給改善計畫。
  研究方法：3 個並行探索 agent（治理文件層／程式碼與 CI 層／運行資料層），
  並與 2026-05-29 自我評估（≈7/10、成熟度 3、R1-R8 已執行）對照。
  使用者於本 session 明確選擇「報告 + P0 修復」範圍：
  修 CI 紅燈（frontend/data.json 漂移）、CLAUDE.md 與 D004/D006 脫節、
  status:blocked 枚舉矛盾、validate_task_card.py crash bug、
  SECURITY.md 佔位模板、CI 守門補洞（audit --check + governance metrics tests）。
  修改 system/ 與 CLAUDE.md 屬 ask，批准紀錄見 logs/approvals/2026-07-05_20260705-001_approval.yaml。
