# === 任務定義 ===
goal: "新增一條 CI 健檢：每張 status: done/review 的 Task Card，其 expected_output.location/filename 必須在 git 中存在（檔案存在於 working tree 即視為 git 中存在；不存在則 CI 紅）"

context: |
  20260502-A02 的關鍵發現：S01/W01/RV01/O02 四張 status: review 卡 audit log 都
  記錄了 outputs/drafts/ai-era-solo-business-*.md 路徑，但這些檔案在 working tree
  與 git 任一 ref 中皆不存在。根因：outputs/drafts/ 在 2026-04-04 仍在 .gitignore，
  2026-04-11（commit f32ba4a）才被 fix。

  類似的隱形遺失若無自動化檢查，未來會再發生（例如新加 .gitignore 規則、誤刪 draft、
  或人為移動檔案而忘了更新 Task Card）。本健檢攔截這類 drift。

  範圍取捨：
    - 只查 status ∈ {done, review} 的卡（pending/in_progress/checkpoint/failed 的卡輸出
      尚未或不應存在）。
    - 只查 tasks/ 頂層（不含 tasks/examples/、不含 tasks/archived/，因為 archived 的
      原始輸出本來就允許不存在 — 那正是歸檔的合法情境之一）。
    - 不對輸出內容做任何斷言（不查空檔、不查 schema），只查存在性。

  與既有 spec consistency 檢查（scripts/check_spec_consistency.rb）的關係：
    - 既有檢查負責 schema、欄位完整性
    - 本檢查負責 schema 與 filesystem 的一致性
    - 兩者互補，本檢查可作為新獨立 step，也可作為 check_spec_consistency.rb 的新檢查項

  實作建議（執行卡時可微調）：
    - 新檔 scripts/check_task_output_exists.py（Python，沿用既有 PyYAML 依賴）
    - 對應 unit test scripts/test_check_task_output_exists.py（至少 4 個 case：
      done 卡輸出存在 ✓、done 卡輸出缺失 ✗、archived 卡輸出缺失 ✓ 略過、
      pending 卡輸出缺失 ✓ 略過）
    - .github/workflows/spec-consistency.yml 新增一個 step

