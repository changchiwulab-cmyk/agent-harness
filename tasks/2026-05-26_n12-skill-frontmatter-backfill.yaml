# Task Card — N12：補齊 4 個 SKILL.md frontmatter + .claude/skills/ symlink
# 來源：A01 audit 報告 §4.3 建議 S1（P0）
# 上游：20260509-N03（research SKILL frontmatter PoC，H1 部分成立）
# 下游：20260526-N13（5 個 .claude/agents/ subagent 落地，依賴本卡的 frontmatter 完成）

task_id: "20260526-N12"
date: "2026-05-26"
status: "pending"

# === 任務定義 ===
goal: "為 skills/{analysis,ops,review,writing}/SKILL.md 加上 YAML frontmatter（沿用 N03 research 的格式），並建立對應的 .claude/skills/ symlink，使 5 個 skill 都能被 Claude Code 原生 Skills 自動載入"

context: |
  N03 PoC 已驗證 research skill 的 frontmatter + symlink 模式，H1「原生自動路由可取代部分
  ROUTING_RULES」部分成立。當前 5 個 skill 只有 research 完成此遷移，其他 4 個無 frontmatter，
  造成原生 Skills 自動載入只覆蓋 1/5，且 .claude/skills/ 只 symlink 了 research。
  本卡為 N03 PoC 結論的延伸落地，純機械化動作（複製格式 + 改 description）。
  落地後 NATIVE_OVERLAP 中「Subagents + Slash Commands」維度的 overlap 應從 100% 降至 ~70%。

input_data:
  - "skills/research/SKILL.md"          # 已完成的 frontmatter 範本
  - "skills/analysis/SKILL.md"          # 待補
  - "skills/ops/SKILL.md"               # 待補
  - "skills/review/SKILL.md"            # 待補
  - "skills/writing/SKILL.md"           # 待補
  - "outputs/drafts/2026-05-09_n03_skills-native-poc.md"  # N03 PoC 結論與 description 撰寫指引

# === 完成標準 ===
definition_of_done:
  - "skills/analysis/SKILL.md 加上 frontmatter（name: analysis + description ≥ 80 字描述用途/觸發場景/輸出規範），原 markdown 內容不刪改"
  - "skills/ops/SKILL.md 加上 frontmatter（同上格式）"
  - "skills/review/SKILL.md 加上 frontmatter（同上格式）"
  - "skills/writing/SKILL.md 加上 frontmatter（同上格式）"
  - "4 份新 frontmatter 用 yaml.safe_load 可解析"
  - "建立 .claude/skills/{analysis,ops,review,writing} 4 個 symlink，目標為 ../../skills/<name>"
  - "ruby scripts/check_spec_consistency.rb 通過（不破壞既有檢查）"
  - "向後相容：所有引用 skills/<name>/SKILL.md 的腳本與文件不受影響"

expected_output:
  format: "md"
  location: "skills/"
  filename: "(in-place: 4 個 SKILL.md + 4 個 .claude/skills/ symlink)"

# === 風險與權限 ===
