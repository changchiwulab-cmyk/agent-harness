# === 任務定義 ===
goal: "依專案規範，連跑三次完整測試套件 + 前端開機煙霧測試，產出三次測試報告"
context: >
  使用者要求「測試專案運行，用專案規範下去測試三次，直接出測試報告給我」。
  本框架的「測試」即 .github/workflows/spec-consistency.yml 定義的 12 步驗證套件，
  外加本地前端看板（scripts/run_frontend.sh）開機煙霧測試。連跑三次以確認可重現性/穩定度。
input_data:
  - ".github/workflows/spec-consistency.yml"
  - "scripts/"
  - "tests/e2e/"

# === 完成標準（最重要的欄位）===
definition_of_done:
  - "spec-consistency.yml 定義的 12 步驗證套件，連續執行三次，逐步×逐次結果完整擷取"
  - "前端 scripts/run_frontend.sh 開機煙霧測試三次，curl index.html 與 data.json 皆回 HTTP 200"
  - "測試報告含：總判定、環境、12步×3次結果矩陣、各步耗時、三次穩定度判讀、前端煙霧結果、四層 gate 結果"
  - "依 GATE_POLICY 四層 gate 全數記錄 pass/fail；報告留存於 outputs/drafts/（非 reports/）"

# === 輸出定義 ===
expected_output:
  format: "md"
  location: "outputs/drafts/"
  filename: "2026-06-30_project-test-run-report.md"

# === 風險與權限 ===
risk_level: "low"              # 純讀取 + 跑專案自身測試 + 寫草稿/logs
approval_needed: false
allowed_tools:
  - "file_read"
  - "run_tests"
  - "write_drafts"
  - "write_logs"
  - "git_commit_checkpoint"

# === 成本控制 ===
max_tool_calls: 60             # 三次 ×（12 步 + 前端煙霧）需較多次 shell 呼叫
max_retries: 3
max_web_searches: 0

# === Skill 路由 ===
skill_type: "ops"

# === 執行紀錄（由 agent 填寫）===
checkpoints: []
