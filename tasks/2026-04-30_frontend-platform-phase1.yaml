# === 任務定義 ===
goal: "Phase 1：在 Phase 0 baseline 之上把後端 data.json 中尚未呈現的訊號（gate_results、approval/risk、decision↔task 連結）視覺化，並把 app.js 的純邏輯函式抽出加單元測試"

context: |
  Phase 0（20260427-F01, PR #58 已合併）把前端 baseline 收緊：generator → data.json、
  CI drift check、generator unit tests。目前 frontend/app.js 只呈現 task_id/title/status
  與 decision summary，後端早已產出但前端未利用的訊號包含：
    - logs[].gate_results（schema/rule/completion/risk × pass/fail，是「可審核」原則的核心）
    - tasks[].risk_level / approval_needed（風險矩陣）
    - tasks[].skill_type / status（pipeline 視角）
    - decisions[].related_task（與 task list 的可點擊連結）
    - decisions[].revisit_trigger（決策再評估觸發條件，目前完全沒呈現）

  另外 app.js 是過程式碼、沒有測試；後續 phase 2/3 會繼續疊加會難以維護。
  本 phase 只做最小可審核的視覺化 + helpers 抽取，不動 generator 與 data schema。

input_data:
