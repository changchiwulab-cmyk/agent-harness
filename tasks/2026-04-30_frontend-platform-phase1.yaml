# === 完成標準 ===
definition_of_done:
  - "logs 看板每張卡片呈現 gate_results 四燈號（schema/rule/completion/risk × pass=綠/fail=紅/缺值=灰），並在缺欄位時 fallback 顯示 N/A 而非空白"
  - "filters 區新增 status / skill_type / risk_level / approval_needed 四個 facet（select 或 chip），與 keyword/date 一起 AND 組合"
  - "summary cards 多兩張：by-status pipeline（review/done/failed/partial 計數）、by-risk（low/medium/high/critical 計數）"
  - "decision card 內若 related_task 非空：呈現可點擊連結，點擊將 keyword 帶入 task_id 並重套篩選"
  - "decision card 補呈現 revisit_trigger 文字（折疊在 details 內）"
  - "loading / error / empty 三態統一處理：載入時顯示 placeholder、fetch 失敗顯示錯誤卡、過濾後 0 筆顯示「無符合條件資料」"
  - "frontend/app.js 拆出 frontend/lib.js 收容 pure helpers（escapeHtml / decisionDate / inDateRange / filterTasks / filterDecisions / aggregate）並為每個 helper 寫對應的 node:test 單元測試（frontend/lib.test.mjs，至少 8 個 case）"
  - "scripts/run_frontend.sh 行為與 CLI 介面不變；generator 不需任何修改；data.json 內容與 schema 不動"
  - "scripts/generate_frontend_manifest.py --check 仍 pass（確認本 phase 沒造成 drift）"
  - "node --test frontend/lib.test.mjs 全綠；現有 python -m unittest scripts/test_generate_frontend_manifest.py 仍全綠"
  - "outputs/drafts/20260430-F02_phase1-summary.md 產出實作摘要（變動檔案、測試結果、UI 截圖描述、剩餘風險）"
  - "logs/AUDIT_LOG.md 新增 1 筆紀錄；本任務 risk=medium 且 happy path 預期 < 3 checkpoints，依 D006 narrow scope 不寫 logs/runs/"

