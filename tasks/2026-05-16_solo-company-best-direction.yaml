# === 完成標準（最重要的欄位）===
definition_of_done:
  - "至少 6 個候選方向 + 1 個「不做／維持現狀」選項，每個跑六維評估（價值/成本/風險/可行性/執行難度/預期回報）+ 一人公司適配度"
  - "成本與風險量化（客單區間 NT$、啟動時間、獲客成本或成功機率），不只用高/低"
  - "給出明確排序與「最佳主方向 + 1 疊加品」建議，結論可逐點追溯到 R01/T03 證據"
  - "12 個月執行路線：分季里程碑、獲客 funnel、政策／補貼／展會日曆對接點、每季可驗證指標"
  - "風險逆轉條件：列出最佳方向的 2-3 個高風險假設，若失效則改採哪個備選"
  - "事實 / 合理推論 / 待驗證 / 高風險假設四態明確分開標記"
  - "輸出符合 skills/analysis/SKILL.md 格式"
  - "預算限制：~2500-3500 字"

