result_summary: "DoD 5/5。關鍵設計偏差（已核准）：官方 hooks 文件確認 PostToolUse 只在成功觸發、失敗走 PostToolUseFailure，故實作為兩事件同一工具範圍（Bash|Write|Edit|MultiEdit|NotebookEdit）——failure→--post-hook 自動 --record、success→自動歸零（連續語意）；計數鍵取 active task（idle no-op）、is_interrupt 不記、達門檻 exit 2 non-blocking 警告（攔阻仍由 PreToolUse --hook 專責，不回歸）。輸入層 fail-open（空 stdin／壞 JSON／未知事件／內部例外→不記數不 block＋stderr 警告）13 例新測試鎖定（合計 25 例，隨既有 CI step 進 spec-consistency）；SECURITY.md fail-open 章節＋PERMISSIONS enforcement 段＋CLAUDE.md 硬規則 3 同步（context budget ~1620/3000 綠）。手動 drill：3 筆合成 failure→3/3→PreToolUse exit 2 攔阻→reset→成功歸零。存量卡零回填；全套 Python＋Ruby＋4 e2e＋evals＋sync_derived --check 不回歸。verification_loop 閉環 outcome=pass（RUN-20260716-001、APR-20260716-001）。"
