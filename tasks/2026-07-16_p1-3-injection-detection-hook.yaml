result_summary: "DoD 5/5。佈線擇定 Stop hook（優先案成立）：Stop payload 雖無改動檔清單，但以 git 推導（工作樹 dirty 含 untracked ∪ 相對 origin/main merge-base 的已 commit 差異——checkpoint 後檔案不再 dirty，缺後者會漏掃），CI 次選的 fallback 條件不成立；CI 亦看不到未 commit 的 session 草稿、警告離工作現場太遠。advisory 語意以測試鎖定：命中未隔離注入樣式→stderr（檔案路徑＋命中規則）＋systemMessage＋ledger，永遠 exit 0 不 block、乾淨時安靜、[未受信任來源] 區塊級隔離放行。誤報觀察機制：tracked ledger logs/untrusted_content_hits.jsonl（ephemeral session 下 gitignored 檔活不過 container，兩週統計會斷），欄位 ts/file/rule/fragment/sha/task_id/session_id/verdict，(file, rule, sha) 去重，--stats 分組統計供兩週後 blocking 升級決策。整條路徑 fail-open（git 失敗／壞 stdin／不可讀檔→安靜 exit 0）：advisory 非安全邊界，硬防線仍在 permissions_guard。零 system/ 修改（advisory 依 session_stop_checks 先例不登記 enforcement 段）。16 例新測試（合計 23）＋e2e 佈線斷言，CI 零改動即涵蓋；手動 drill 命中→去重→隔離放行→stats 全通過、殘留清除。存量卡零回填；全套 Python＋Ruby＋4 e2e＋evals＋sync_derived --check 不回歸（RUN-20260717-001、APR-20260717-001）。"
