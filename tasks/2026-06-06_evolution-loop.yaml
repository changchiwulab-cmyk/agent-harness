# === 任務定義 ===
goal: "建立提案制（人工把關）的自我進化迴圈：自動觀測四面向（成本/失敗/Gate/決策）→ 產出進化提案草稿到 outputs/drafts/，所有 system/skills 變更仍需人工核可；復用既有驗證器與觀測工具，納入 CI 乾跑"
