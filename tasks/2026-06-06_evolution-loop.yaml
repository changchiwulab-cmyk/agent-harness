  - "scripts/test_evolution_loop.py：覆蓋四面向觸發 + healthy 無提案 + propose-only invariant（全需人工）+ live-repo 不崩"
  - "system/EVOLUTION_LOOP.md：記錄五步閉環、四面向閾值、為何提案制、與 RETRO_FLOW 關係"
  - "system/RETRO_FLOW.md：交叉引用 evolution_loop 為自動化前端"
  - ".github/workflows/spec-consistency.yml：新增 evolution loop 測試 + advisory 乾跑步驟"
  - "迴圈永不自動改 system/skills/memory；只寫 outputs/drafts/（程式碼層強制）"
  - "全套 CI 仍全綠"

