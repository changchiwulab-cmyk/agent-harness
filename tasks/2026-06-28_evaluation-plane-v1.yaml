# === 任務定義 ===
goal: "新增評估平面（第四平面）：把 skills/*/eval_examples.md 轉成可機讀 rubric，建立 eval 記錄 schema、deterministic 評分守門 runner、golden 回歸、CI 與觀測/前端接線，讓輸出品質可量化、可追蹤、可防漂移"
context: |
  專案成熟度 3→4 的關鍵之一是「可觀測性只到工具層，業務層品質趨勢缺、學習迴路開環」
