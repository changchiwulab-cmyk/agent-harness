# === 任務定義 ===
goal: "收斂 PR #55 為前端平台的最小可審核 baseline：穩定 YAML 解析、防 manifest 漂移、補 generator 測試與 CI 護欄"

context: |
  PR #55（codex/create-dynamic-frontend-interface-o2shz6）引入 frontend/ 看板與
  scripts/generate_frontend_manifest.py + scripts/run_frontend.sh。功能可運作，
  但有四個風險使其不適合直接合進 main：
    (1) frontend/app.js 用單行 regex 抓 YAML top-level key，遇多行字串/巢狀
        欄位（gate_results、approvals[]、tools_used[]、options_considered[]）
        會顯示失真 → 違反「可審核」原則。
    (2) manifest.js 是 generator 寫死的路徑陣列；無 CI 檢查，極易與檔案系統
        實況漂移（新增/刪除 task 或 decision 後忘記重跑就會錯）。
    (3) decisions glob 寫死 memory/active_projects/agent-harness/decisions/*.yaml，
        未來新增 active project 不會被收進來。
    (4) generator 沒對應測試（對照 O03 的 check_context_budget + 其 ruby tests
        的標準，新工具進 main 應附測試）。

  本任務只做 Phase 0：把 #55 baseline 收緊。Phase 1（Gate/Approval/Failure
  視覺化）、Phase 2（Context Budget 儀表板）、Phase 3（Decision Graph）另開
  Task Card，本卡不涵蓋。

