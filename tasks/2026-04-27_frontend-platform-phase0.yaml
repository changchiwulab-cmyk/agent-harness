  - "frontend/app.js 改讀 ./data.json，移除原有 regex parser；保留 keyword/date 篩選與 summary/timeline/log 三個 panel"
  - "frontend/manifest.js 廢棄並從 repo 移除（資料來源唯一化於 data.json）"
  - "generator decisions glob 改為 memory/active_projects/*/decisions/*.yaml（多 project 友善）"
  - "新增 scripts/test_generate_frontend_manifest.py（pytest 或 unittest 皆可）：至少 3 個 case—(a) 空輸入產生空陣列、(b) 多 project decisions 全收齊、(c) 兩次執行對相同輸入產生位元完全相同的 data.json（idempotent）"
  - ".github/workflows/spec-consistency.yml 新增步驟：python3 scripts/generate_frontend_manifest.py && git diff --exit-code frontend/data.json（漂移即失敗）"
