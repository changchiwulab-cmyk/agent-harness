  - "validate_task_card.py 對本卡 exit 0；新增的 pytest 全綠；spec-consistency CI 在 PR 上跑通"
  - "outputs/drafts/20260427-F01_phase0-summary.md 產出實作摘要（變動檔案、測試結果、剩餘風險）"
  - "logs/AUDIT_LOG.md 新增 1 筆紀錄；若任務出現 failed/partial 或 ≥3 checkpoints，依 D006 narrow scope 寫 logs/runs/"

