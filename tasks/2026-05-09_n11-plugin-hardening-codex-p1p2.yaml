# === 任務定義 ===
goal: "在 plugin v0.1.0 candidate 推上 agent-governance repo 之前，修掉 Codex 指出的 P1（risk gate 在 output_path 缺席時被略過 → 治理破口）+ P2（gate_completion 對非字串 DoD 入項會 TypeError 崩潰）。屬 plugin tree 內部 hardening，不影響 agent-harness 端"

context: |
  PR #71 review 流程觸發 chatgpt-codex-connector[bot] 兩條評論：

  P1（outputs/drafts/agent-governance-bootstrap/hooks/post_task_use.py:82）：
    risk = gate_risk(card, output_path) if output_path else ("n/a", "no output path provided")
    短路導致 high/critical 任務在 output_path 為 None 時得到 risk_check="n/a"，
    繞過 gate_risk 本身對 None 已有的 fail-closed 邏輯（line 65-69）。

  P2（同檔 line 59）：
    misses = [line for line in (card.get("definition_of_done") or []) if line not in body]
    DoD 入項為非字串時 `line not in body` 觸發 TypeError → hook 崩潰，無法返回
    結構化 verdict。validate_task_card 不嚴格擋型別，所以這是現實 input path。

  使用者於 2026-05-09 選擇「新 PR 修（推薦）」處理（PR #71 維持 drafts-only scope）。
  本 PR stack 在 PR #69（claude/complete-test-plan-VMGDj）上，merge 順序：#69 → 本 PR
  → #71（rebase 後 runbook 從 26 → 28 tests）。

