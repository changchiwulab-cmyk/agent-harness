# Task Card — Parity CI 與 Audit Completeness Gate
# 來源：deep-research-report-2.md 改進清單 P0「docs parity gate」+「audit completeness merge gate」

task_id: "20260426-O05"
date: "2026-04-26"
status: "pending"

# === 任務定義 ===
goal: "把「文件 parity」與「audit completeness」變成 main merge 前的 CI 硬門檻"
context: >
  Deep research report 指出問題不是單一 bug，而是「規則檔、啟動檔、說明檔」並存多個真相。
  目前 spec-consistency.rb 只檢查 task card schema 與目錄存在，沒檢查文件之間的列舉一致性，
  也沒檢查 status=done 的 task 是否有對應 audit entry。本任務新增兩支檢查並接上 CI。
input_data:
  - "scripts/check_spec_consistency.rb"
  - ".github/workflows/spec-consistency.yml"
  - "system/PERMISSIONS.yaml"
  - "README.md"
  - "tasks/TASK_CARD_TEMPLATE.yaml"
  - "logs/AUDIT_LOG.md"

# === 完成標準 ===
definition_of_done:
  - "新增 scripts/check_audit_completeness.rb：掃 tasks/*.yaml status=done|failed，比對 logs/AUDIT_LOG.md 必含對應 task_id；缺漏即 exit 1"
  - "新增 scripts/check_docs_parity.rb：檢查 README.md 的 skill_type 列舉、TEMPLATE skill_type 註解、ROUTING_RULES.md 的 skill 表、PERMISSIONS.yaml 的 allow/ask/deny 與 CLAUDE.md 提及的權限分類，三方一致"
  - "新增對應的 unit test：scripts/test_check_audit_completeness.rb / scripts/test_check_docs_parity.rb（含正向 + 故意 drift 的反向 case）"
  - ".github/workflows/spec-consistency.yml 加入兩個新 step（unit tests + 主檢查）"
  - "故意製造一筆 drift（例如暫時把 README skill_type 拿掉一個），跑兩支 check 都會 fail；恢復後通過"
  - "全部本地測試通過：ruby syntax + unit tests + check_spec_consistency + check_audit_completeness + check_docs_parity + check_context_budget"

# === 輸出定義 ===
expected_output:
  format: "rb"
  location: "scripts/"
  filename: "check_audit_completeness.rb, check_docs_parity.rb, test_check_audit_completeness.rb, test_check_docs_parity.rb"

# === 風險與權限 ===
risk_level: "high"
approval_needed: true
allowed_tools:
  - "file_read"
  - "file_edit"
  - "file_write"
  - "bash"

# === 成本控制 ===
max_tool_calls: 30
max_retries: 3
max_web_searches: 0

# === Skill 路由 ===
skill_type: "ops"

