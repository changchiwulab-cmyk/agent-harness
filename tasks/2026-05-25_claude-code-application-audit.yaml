approval_needed: true          # 報告產出後需人工確認是否接受、是否升級為 follow-up 卡
allowed_tools:
  - "file_read"
  - "file_search"
  - "write_drafts"
  - "git_commit_checkpoint"

# === 成本控制 ===
max_tool_calls: 25
max_retries: 3
max_web_searches: 0            # 不需要 web；所有資訊從專案內部 + session 已知工具列表即可

# === Skill 路由 ===
skill_type: "analysis"         # 多選項評估（順手可做 vs 另開卡）+ 對 4 維度六維化評分

