# === 完成標準（10 條，逐條可驗證）===
definition_of_done:
  - "報告涵蓋 4 大維度（hooks 進階、subagents+slash commands、MCP、Claude Code on the web），每維度有「現況 → 缺口 → 建議」三段"
  - "每條建議標 P0/P1/P2 優先級，並註明「順手可做（本報告附 patch 建議）」或「須另開 Task Card」"
  - "Hooks 章節對應 3 條硬規則，分別給 PostToolUse（失敗 3 次計數）、Stop（audit log 自動追加）、SessionStart（bootstrap context）、UserPromptSubmit（無 Task Card 提醒）四個 hook 的 matcher 與腳本骨架描述"
  - "Subagents 章節列出 5 個 skill_type 對應的 .claude/agents/*.md frontmatter 草案（name + description + tools），tools 白名單對齊 PERMISSIONS.yaml"
  - "Slash Commands 章節至少設計 /task-new、/task-validate、/gate-check 三條，含 argument-hint 與 allowed-tools"
  - "MCP 章節清點本 session 自帶的 mcp__github__* 工具，分讀寫兩組，提案 PERMISSIONS.yaml 新增 mcp_github_read / mcp_github_write 兩組分類，指出 merge_pull_request / push_files 應落 ask 或 deny"
  - "Web 章節列出 Claude Code on the web 與本地 CLI 的環境差異（fs ephemeral、background process 限制、MCP 預載、settings 來源），並評估「連續失敗 3 次停下」在 web 是否仍可由 PostToolUse 偵測"
  - "報告末尾有「順手可做 vs 須另開卡」分流表，順手可做列 NATIVE_OVERLAP.yaml 與 PERMISSIONS.yaml 的 patch 建議片段；須另開卡列 6-7 張 follow-up Task Card 候選清單（task_id + goal + 預估 risk_level）"
  - "報告檔案落在 outputs/drafts/，檔名 2026-05-25_claude-code-application-audit.md，首頁標 risk_level: high, status: draft, requires_human_review: true"
  - "報告末尾附 Gate Policy 四層自檢表（schema/rule/completion/risk 各條 pass/fail/partial + 引用章節）"

# === 輸出定義 ===
expected_output:
