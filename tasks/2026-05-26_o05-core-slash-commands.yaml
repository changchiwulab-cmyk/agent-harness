  - "建立 .claude/commands/gate-check.md：frontmatter 含 description, argument-hint <task_id>, allowed-tools (Read, Bash)；body 指示跑四層 self-check（schema → rule 工具白名單 → completion DoD 對照 → risk 檔案位置）"
