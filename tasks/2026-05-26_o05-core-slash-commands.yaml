# === 任務定義 ===
goal: "建立 .claude/commands/ 下 3 條核心 slash commands：/task-new（從 TEMPLATE 產草稿）、/task-validate（wrap validate_task_card.py）、/gate-check（跑 GATE_POLICY 四層 self-check）"

context: |
  目前 .claude/commands/ 完全空白，INTAKE_FLOW.md / RETRO_FLOW.md / validate_task_card.py 都
  靠使用者手動呼叫。3 條核心 command 落地後可顯著降低 Task Card 生命週期的人工成本：
    - /task-new：硬規則 1（沒有 Task Card 不執行）的入口
    - /task-validate：Gate Policy 第一層 schema_check 的快捷
    - /gate-check：四層驗證的快捷（避免人工逐條檢查）
  本卡不涉及任何系統規則修改，只建立新檔案，風險低。

input_data:
  - "tasks/TASK_CARD_TEMPLATE.yaml"           # /task-new 的範本
  - "system/validate_task_card.py"            # /task-validate 包裝對象
  - "system/GATE_POLICY.yaml"                 # /gate-check 的 4 層定義
  - "outputs/drafts/2026-05-25_claude-code-application-audit.md"  # §4.3 S3 草案

