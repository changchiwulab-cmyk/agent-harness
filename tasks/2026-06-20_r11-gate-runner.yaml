# Task Card — R11 Gate Runner（四層 Gate 變可執行驗證器）
# 來源：workflow 優化計畫「主軸：硬規則 runtime 強制化」R11
# 補洞：自評報告 §四.1 指出「四層 Gate 只有 prompt checklist，無 post-execution 驗證 script」

task_id: "20260620-001"
date: "2026-06-20"
status: "review"

# === 任務定義 ===
goal: "把 system/GATE_POLICY.yaml 的四層 checklist 從 prompt 提醒，變成 scripts/gate_runner.py 的確定性 post-execution 驗證器，對既有 run log + task card 獨立重跑四層 gate"
context: |
  GATE_POLICY 四層（schema/rule/completion/risk）目前靠 agent 自律執行，無可執行守門。
  gate_runner.py 重用 system/validate_task_card.py 作 schema_check（勿重寫），
  rule_check 比對 run log tools_used ⊆ task card allowed_tools、無 deny 動作、>5 次呼叫需 checkpoint，
  completion_check 驗 output_path 存在，risk_check 驗 high/critical 產出落在 outputs/drafts/。
  獨立重跑代表可能與 run log 記錄值不同（例如故障演練 RUN-20260529-003 記 schema fail 是針對 fixture，
  而 gate_runner 重驗 task card 本身會 pass）——這是 by design 的 cross-check，不是 bug。
input_data:
  - "system/GATE_POLICY.yaml"
  - "system/validate_task_card.py"
  - "system/PERMISSIONS.yaml"
  - "system/EXECUTION_LOG_SCHEMA.yaml"
  - "logs/runs/"

# === 完成標準 ===
definition_of_done:
  - "scripts/gate_runner.py：gate_schema/gate_rule/gate_completion/gate_risk + run_all + CLI(--run-log/--task-card/--all/--json)"
  - "schema_check 直接呼叫 system/validate_task_card.py（重用，不重寫驗證邏輯）"
  - "對 logs/runs/20260409-001_system-validation.yaml 四層全 pass、exit 0；對 broken fixture --task-card 回 schema fail、exit 非零"
  - "scripts/test_gate_runner.py 全綠（schema/rule/completion/risk + run_all + CLI + 回歸案例）"
  - "CI 新增 gate runner 測試步驟"

# === 輸出定義 ===
expected_output:
  format: "py"
  location: "scripts/"
  filename: "gate_runner.py"

# === 風險與權限 ===
risk_level: "low"
approval_needed: false
allowed_tools:
  - "file_read"
  - "create_output_files"
  - "git_commit_checkpoint"

# === 成本控制 ===
max_tool_calls: 20
max_retries: 3
max_web_searches: 0

# === Skill 路由 ===
skill_type: "ops"

# === 執行紀錄（由 agent 填寫）===
checkpoints: []
actual_tool_calls: 0
result_summary: ""
completion_time: ""
audit_log_ref: "logs/AUDIT_LOG.md"
