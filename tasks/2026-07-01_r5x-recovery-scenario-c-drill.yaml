# 本卡就是那次實測。低風險：純內部模擬，不碰生產資料，不動 system/。

task_id: "20260701-002"
date: "2026-07-01"
status: "in_progress"

# === 任務定義 ===
goal: "實測 RECOVERY_RUNBOOK.md 場景 C：任務中途模擬 context 重置後，只靠 git log --grep + Task Card + 進度檔重建狀態並正確接續（不重做、不跳過），把恢復路徑從紙上設計變成有實證的機制"
context: |
  自我評估與 R5 演練都指出：Scenario A/B/D 已實測，唯獨 Scenario C（context 重置後
  接續執行）從未真的跑過，只是 runbook 上的紙上程序。
  設計：用一個 3-checkpoint 的模擬任務（tests/e2e/fixtures/scenario_c_progress.yaml
  扮演 logs/runs/<RUN>.yaml 的角色，記錄 completed_steps/next_step）。做完 checkpoint
  1、2 之後，「重置」步驟明確只讀 3 個來源：
    (1) git log --oneline --grep="checkpoint: 20260701-002"
    (2) 本 Task Card 的 goal / definition_of_done
    (3) tests/e2e/fixtures/scenario_c_progress.yaml 的 completed_steps/next_step
  不依賴任何本次對話記憶以外的假設，藉此驗證「接續執行」在只有這三個來源時是否
  仍能正確判斷下一步、且不重做已完成的 step 1/2。
input_data:
  - "system/RECOVERY_RUNBOOK.md"
  - "tests/e2e/fixtures/scenario_c_progress.yaml"

# === 完成標準 ===
