  - "tests/e2e/fixtures/scenario_c_progress.yaml 走完 3 個 checkpoint（step 1→2→3），checkpoint 2→3 之間明確模擬 context 重置"
  - "重置後的接續步驟只引用 git log --grep 輸出、本 Task Card、進度檔三者，不依賴額外假設；步驟與輸出寫入 RECOVERY_RUNBOOK.md 附錄"
  - "驗證 checkpoint 3 的 diff 只新增 step 3 相關內容，未修改/重做 step 1、2 已寫入的內容（避免『接續』變成『重做』）"
  - "RECOVERY_RUNBOOK.md 附錄新增 Scenario C 實測紀錄（比照 Scenario A 表格格式：場景/checkpoint/指令/耗時/驗證/結論），並移除原本『建議下次實測』的待辦註記"
  - "還原後一致性檢查（ruby scripts/check_spec_consistency.rb + python3 scripts/generate_frontend_manifest.py --check）全綠；未修改任何 system/ 檔以外的 RECOVERY_RUNBOOK.md"

