  - "generator 在 collect_tasks() 增加衍生欄位 schema_issues: [str]，列出 Task Card 缺漏（goal 空、definition_of_done 為空陣列、risk_level 不在合法值、skill_type 不在合法值、status 為 failed/blocked），並把判斷邏輯寫成獨立函式 detect_task_schema_issues(doc) 以便單元測試"
  - "frontend/data.json 經本任務重產後保持 byte-identical idempotent（連續跑兩次內容一致）；CI drift check (--check) 通過"
  - "frontend/index.html 新增『錯誤儀表板』區塊，至少含：(a) 4 張 KPI 卡（總錯誤事件數 / Gate 失敗次數 / 失敗任務數 / Schema 缺漏數）；(b) FAILURE_TAXONOMY 分類圓餅圖；(c) 錯誤事件時間軸柱狀圖（按月分桶）；(d) 可篩選（依 error_type / 依 gate / 依 task）與排序的錯誤列表；(e) 點擊任一筆可展開原始 YAML/Markdown 內容"
  - "frontend/app.js 以 Chart.js v4 ESM CDN 載入；CDN 失敗時降級為純表格（顯示提示但不破版）；既有的 Tasks/Logs/Decisions 區塊保留可用，不被回歸破壞"
  - "frontend/styles.css 加入儀表板區塊與圖表容器樣式；維持現有色系與 ≤ 900px 的 RWD"
  - "scripts/test_generate_frontend_manifest.py 新增至少 4 個 case：(i) errors 解析成功且排除 template/gitkeep；(ii) detect_task_schema_issues 對缺 DoD / 缺 risk_level / status=failed 各能命中；(iii) gate_results 中任一 fail 即 has_gate_failure=true 且 failed_gates 列出該欄位；(iv) 含 errors 後仍 idempotent"
  - "scripts/run_frontend.sh CLI 介面（--no-generate / --help / --version / 自訂 port）行為不變；版本號可升至 1.5.0 並更新 LAST_UPDATED"
  - "README.md「前端動態介面」章節同步更新：說明錯誤儀表板區塊、Chart.js CDN 來源與離線降級行為"
  - "validate_task_card.py 對本卡 exit 0；scripts/test_generate_frontend_manifest.py 全綠；本地以 scripts/run_frontend.sh 啟動後手動煙測 4 個 KPI 卡 + 圖表 + 錯誤列表 drill-down 皆顯示正常（截圖或文字觀察記在 summary）"
  - "outputs/drafts/2026-05-11_F02_error-dashboard-summary.md 產出實作摘要（變動檔案、測試結果、剩餘風險、煙測結果）"
