# === 任務定義 ===
goal: "將 frontend/ 看板擴充為「錯誤儀表板」：把 logs/errors/、logs/runs/ 的失敗紀錄、tasks/ 的失敗/被卡任務、Task Card schema 缺漏，整合成可一眼看到錯誤點的互動式 HTML（含 KPI、時間軸、Chart.js 分類圖、可篩選/排序與 drill-down 詳情）"

context: |
  20260427-F01 (Phase 0) 收斂 PR #55 為穩定 baseline 時，已將 Phase 1
  「Gate / Approval / Failure 視覺化」明確排程為後續任務（見該卡 context 段）。
  本卡即 Phase 1：把 harness 既有的失敗訊號（logs/errors/ 的 14 類
  FAILURE_TAXONOMY 事件、logs/runs/ 的 status=failed/partial 與 4 層
  gate_results、tasks/ 的 status=failed/blocked、以及 Task Card schema 缺漏）
  在同一個前端介面攤開，讓使用者與 agent 都能在第一時間定位錯誤點。

  資料管道沿用 F01 既有設計：scripts/generate_frontend_manifest.py
  產出 frontend/data.json（CI 有 drift check）。本卡不引入新 build 工具，
  只擴充 generator 的 collection 集合與 frontend 的渲染區塊，並引入
  Chart.js (CDN, ESM build) 做時間軸/分類圖；無 CDN 時降級為純列表。

  執行模式：規劃由 Opus 4.7 完成（本卡 + drafts/ 計畫書）；實作由 Sonnet 4.6
  sub-agent 在審核通過後接手，產出由 Opus 做 4 層 gate 驗證後 checkpoint。

