name: Governance Metrics

# 整合平面對策（2026-07-06 架構診斷）：M5 open-PR 積壓需要 GitHub API 資料，
# 本地月跑拿不到 → 由排程 workflow 以 GITHUB_TOKEN 抓取後餵入。
# 刻意獨立於 spec-consistency.yml：warn/alert 會讓本 workflow 變紅（警戒線可見），
# 但不掛在 pull_request 上、不阻塞開發。

on:
  schedule:
    - cron: '0 1 * * 1'   # 每週一 01:00 UTC；月度人工跑（本地）仍是主流程
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install --no-cache-dir pyyaml

      - name: Fetch open PRs
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100&sort=created&direction=asc" \
            -o "$RUNNER_TEMP/open_prs.json"

      - name: Run governance metrics (M1–M5)
        # 顯式 shell: bash 帶 -eo pipefail：否則 step 回傳 tee 的 exit 0，
        # metrics warn/alert 的 exit 1（警戒線紅燈）會被 pipe 吃掉。
        shell: bash
        run: |
          python3 scripts/governance_metrics.py \
            --pr-json "$RUNNER_TEMP/open_prs.json" | tee -a "$GITHUB_STEP_SUMMARY"
