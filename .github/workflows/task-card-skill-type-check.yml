name: Task Card Skill Type Check

on:
  pull_request:
    paths:
      - "tasks/**"
      - "scripts/check_task_card_skill_type.py"
      - ".github/workflows/task-card-skill-type-check.yml"
  push:
    branches:
      - main
    paths:
      - "tasks/**"
      - "scripts/check_task_card_skill_type.py"
      - ".github/workflows/task-card-skill-type-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-task-card-skill-type:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run skill_type consistency check
        run: python scripts/check_task_card_skill_type.py
