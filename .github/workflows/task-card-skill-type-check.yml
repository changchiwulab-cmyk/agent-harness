name: Task Card Skill Type Check

on:
  pull_request:
    paths:
      - "tasks/**"
      - "scripts/check_task_card_skill_type.py"
      - ".github/workflows/task-card-skill-type-check.yml"
  push:
    branches:
      - main
    paths:
      - "tasks/**"
      - "scripts/check_task_card_skill_type.py"
      - ".github/workflows/task-card-skill-type-check.yml"
  workflow_dispatch:

jobs:
  check-task-card-skill-type:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Run skill_type consistency check
        run: python scripts/check_task_card_skill_type.py
