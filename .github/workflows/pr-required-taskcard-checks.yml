name: PR Required Taskcard Checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  required-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run spec consistency check
        run: scripts/check_spec_consistency.rb

      - name: Run task card skill_type check
        run: python3 scripts/check_task_card_skill_type.py
