name: Spec Consistency

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - work
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Ruby
        uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1.305.0
        with:
          ruby-version: '3.2'

      - name: Install RuboCop
        run: gem install rubocop --no-document

      - name: Ruby syntax check
        run: ruby -c scripts/check_spec_consistency.rb

      - name: Ruby unit tests
        run: ruby scripts/test_check_spec_consistency.rb

      - name: Ruby dual-path syntax check
        run: ruby -c scripts/check_dual_path_categories.rb

      - name: RuboCop dual-path scripts
        run: rubocop --force-exclusion scripts/check_dual_path_categories.rb scripts/test_check_dual_path_categories.rb

      - name: Ruby dual-path unit tests
        run: ruby scripts/test_check_dual_path_categories.rb

      - name: Spec consistency check
        run: scripts/check_spec_consistency.rb

      - name: Validate dual-path run categories
        run: scripts/check_dual_path_categories.rb

      - name: YAML parse check
        run: ruby -e 'require "yaml"; Dir.glob("**/*.yaml").each{|p| YAML.load_file(p)}; puts "ALL_YAML_OK"'

      - name: Context budget check
        run: |
          ruby scripts/test_check_context_budget.rb
          ruby scripts/check_context_budget.rb

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --no-cache-dir pyyaml

      - name: Frontend manifest tests
        run: python3 scripts/test_generate_frontend_manifest.py

      - name: Frontend manifest drift check
        run: python3 scripts/generate_frontend_manifest.py --check

      - name: Permissions guard tests
        run: python3 scripts/test_permissions_guard.py

      - name: Audit log generator tests
        run: python3 scripts/test_generate_audit_log.py

      - name: E2E dummy task smoke test
        run: python3 tests/e2e/test_dummy_task_smoke.py

      - name: E2E failure-drill regression
        run: python3 tests/e2e/test_failure_drill.py

      - name: Decision revisit tracker tests
        run: ruby scripts/test_check_decision_revisit.rb
