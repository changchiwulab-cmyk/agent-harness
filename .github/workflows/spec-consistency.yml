name: Spec Consistency

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - work

jobs:
  validate-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Ruby
        uses: ruby/setup-ruby@1a615958ad9d422dd932dc1d5823942ee002799f  # v1.227.0
        with:
          ruby-version: '3.2'

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'

      - name: Ruby syntax check
        run: ruby -c scripts/check_spec_consistency.rb

      - name: Ruby unit tests
        run: ruby scripts/test_check_spec_consistency.rb

      - name: Spec consistency check
        run: scripts/check_spec_consistency.rb

      - name: YAML parse check
        run: ruby -e 'require "yaml"; Dir.glob("**/*.yaml").each{|p| YAML.load_file(p)}; puts "ALL_YAML_OK"'

      - name: Python unit tests
        run: python -m unittest discover -s scripts -p "test_*.py" -v

      - name: Python skill-type check
        run: python scripts/check_task_card_skill_type.py
