name: Skill Evals (LLM-judge)

# OPT-IN, non-blocking. This calls the Anthropic API (cost + latency + LLM
# non-determinism), so it is intentionally NOT part of the required
# `Spec Consistency` (validate-spec) gate. Trigger manually, or weekly.
# Requires repo secret ANTHROPIC_API_KEY; if absent, the job no-ops (exit 0).

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"  # Mondays 03:00 UTC

jobs:
  skill-evals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir pyyaml anthropic

      - name: Offline harness tests
        run: python3 scripts/test_run_skill_evals.py

      - name: Run LLM-judge golden evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/run_skill_evals.py
