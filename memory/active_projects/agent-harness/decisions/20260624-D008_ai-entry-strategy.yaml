decision_id: "20260624-D008"
date: "2026-06-24"
project: "agent-harness"

# --- 決策內容 ---
context: |
  R01（20260624-R01）量化三產業 AI 落地困難度（零售電商12 / 製造業25 / 醫療照護30），
  A01（20260624-A01）以 analysis skill 對四選項（含「不做」）跑七維評估，給出排序與
  分階段進入路線。使用者要求把此決策落為正式 Decision Log，並晉升 A01 至 reports/。
  決策前提沿用 R01/T03 persona（台灣、一人公司、20 年管理顧問背景、補貼+案源 funnel 獲客），
  其中「獲客模式」與「時間飽和度」等假設尚未經使用者確認，故定調為「暫定採納」。

options_considered:
  - option: "A. 零售電商（R01 困難度 12，最低）"
    pros: "現成工具可交付、可標準化複製、ROI 快（零售 AI 平均 220%）、補貼 funnel 降獲客成本、最適一人交付；客單 NT$30–80K、量大"
    cons: "單案小、價格競爭（代理商/SaaS 內建）、依賴補貼政策延續"
  - option: "B. 製造業（R01 困難度 25）"
    pros: "單案利潤高（NT$300K–1M）、進入壁壘高＝競爭少、台灣製造基底厚"
    cons: "需製造 domain＋IPC 夥伴、OT/IT 整合最難（維度=5）、95% genAI pilot 無 P&L、週期 3–6 月回收慢、一人難全廠"
  - option: "C. 醫療照護（R01 困難度 30，最高）"
    pros: "案量增長、信任顧問品牌、健保資料結構優勢"
    cons: "診斷類需 TFDA 查驗登記（142 天+臨床驗證）、病安零容錯、銷售週期最長、一人無法承擔醫材查登；僅非醫材行政類可行"
  - option: "D. 不做 / 維持現狀（強制基準）"
    pros: "0 直接成本、保留時間做既有顧問業務、執行風險低"
    cons: "機會成本高＝錯過 2026 補貼收官與 AI 基本法窗口；策略風險＝競爭者卡位"

decision: |
  暫定採納 A01 排序「A 零售電商 ＞ B 製造業 ＞ C 醫療照護 ＞ D 不做」與 4 階段進入路線
  作為 AI 落地切入方向：
    階段0(M0–1) 建零售 AI 導入 SOP + 對接補貼 + 合規顧問疊加；
    階段1(M1–6) 零售補貼陪跑為主力（月 3–5 案）累積案例；
    階段2(M6–12) 達標後找 IPC 夥伴試製造單機/單線 PoC；
    階段3(M12+) 醫療僅接非醫材行政/流程類。
  「暫定」＝A01 假設前提（獲客模式、時間飽和度）尚待使用者確認；非定案承諾。

reasoning: |
  排序與困難度（R01 12/25/30）一致、與 T03「高 ROI 低門檻」順位一致：
  零售在失誤後果(1)、系統整合(2)、ROI 可量化(220%/客單明確) 三維皆最低門檻，
  最符合一人公司「時間為瓶頸、需可標準化現金流」的資源結構；製造、醫療單案利潤高
  但需垂直背景/夥伴與長週期，宜分階段在現金流穩固後再進。D 機會成本過高故 No-Go。
  採分階段而非單選，是為了在低風險先建現金流與案例，再用累積資本承擔較高難度選項。

# --- 追蹤 ---
risk: |
  決策建立在未確認的假設上（獲客模式、時間飽和度、補貼延續）。緩解：定調為「暫定」，
  以階段 1 實跑數據（獲客率、單案工時）作確認門檻；revisit_trigger 明列再評估條件。
revisit_trigger: |
  階段 1 完成 3 件零售補貼陪跑案後，回填實際獲客率與單案工時；若獲客率顯著低於假設
  或單案工時超估 → 重評排序與階段時點。或 A01「待驗證」四項任一證偽。或 2027 補貼結構
  轉向國防/半導體（T03 敏感性）。本觸發為人工 RETRO 判斷（MANUAL），非腳本可量測指標。
