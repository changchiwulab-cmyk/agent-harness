decision_id: "20260424-D006"
date: "2026-04-24"
project: "agent-harness"

# --- 決策內容 ---
context: |
  system/EXECUTION_LOG_SCHEMA.yaml 自 v2 引入（2026-04-09 已落地 1 筆 runs/ 紀錄），
  但近 3 筆任務（20260417-O01/O02/O03）均僅寫 AUDIT_LOG，未寫 logs/runs/。
  首次 RETRO（2026-04-15）亦未將此列為改善項。schema 實質未落地。
  需判斷：要嘛 enforce（gate 補檢查強制寫入），要嘛 narrow scope，要嘛 deprecate。

options_considered:
  - option: "A. Enforce：Gate Policy 新增檢查，每任務必寫 runs/"
    pros: "資料最完整；gate_results、checkpoint hash、token input/output 皆可追溯"
    cons: "雙重紀錄（AUDIT_LOG + runs/）；對短小任務過度工程；實證阻力大（近 3 筆未寫）"
  - option: "B. Deprecate：完全刪除 schema，AUDIT_LOG 作唯一事實來源"
    pros: "最簡；對齊實際做法"
    cons: "失去失敗任務詳細 post-mortem 的結構；未來補回成本高"
  - option: "C. Narrow Scope：僅 failed/partial/多 checkpoint 任務才寫 runs/，happy-path 沿用 AUDIT_LOG"
    pros: "保留 schema 對高價值場景的分析力；降低 happy-path 負擔；對齊「可控 > 能力」原則"
    cons: "需定義清楚觸發條件；未來仍可能漂移"

decision: "選 C（Narrow Scope）"
reasoning: |
  「可恢復、可審核、可量化」三原則中，量化最需要詳細資料；
  但近 5 筆任務零失敗零 partial，顯示 happy-path 下 AUDIT_LOG 已充分。
  failed/partial 任務才是需要深度 post-mortem 的場景。
  保留 schema 但限縮使用範圍，既不失能力又不強加儀式負擔。

# --- 追蹤 ---
risk: "觸發條件若模糊，仍可能無人遵守。緩解：在 schema 檔頭明確列出 4 種觸發情境。"
revisit_trigger: "未來出現 2 筆 failed/partial 任務都未寫 runs/ → 升級為 enforce；或累積 10 筆 runs/ 後檢視實際價值"
related_task: "20260424-O03"
status: "active"
