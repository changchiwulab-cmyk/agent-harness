# Ops 評分量表 — 由 skills/ops/eval_examples.md 判斷標準萃取
skill: ops
pass_threshold: 0.7
criteria:
  - id: plan_first
    description: "計畫先行：先列計畫/Dry-run，等確認後執行"
    weight: 3
    required: true
    check:
      type: present_any
      patterns: ["Dry-run", "等待確認", "操作計畫"]
  - id: inventory
    description: "操作前盤點現狀"
    weight: 2
    check:
      type: present_any
      patterns: ["盤點", "現狀"]
  - id: checkpoint
    description: "有 checkpoint"
    weight: 2
    check:
      type: present_any
      patterns: ["checkpoint"]
  - id: exclude_system_files
    description: "明確排除系統隱藏檔"
    weight: 1
    check:
      type: present_any
      patterns: ["排除", ".DS_Store"]
  - id: not_already_executed
    description: "未先斬後奏（不應宣稱『已完成』就直接動）"
    weight: 2
    required: true
    check:
      type: absent
      patterns: ["已完成整理"]
