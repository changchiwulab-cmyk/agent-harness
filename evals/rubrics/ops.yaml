# Ops skill 評分 rubric
# 來源：skills/ops/eval_examples.md「判斷標準」表
rubric:
  skill: "ops"
  source: "skills/ops/eval_examples.md"
  version: 1
  min_auto_pass_ratio: 0.5
  auto_checks:
    - id: "plan-first"
      desc: "先列操作計畫 / 盤點，等確認後執行"
      scope: "full"
      any_markers: ["操作計畫", "操作目標", "計畫", "dry-run", "Dry-run", "盤點", "等待確認"]
    - id: "checkpoint"
      desc: "提及 checkpoint / 可逆 / 排除系統檔"
      scope: "full"
      any_markers: ["checkpoint", "Checkpoint", "排除", "可逆", "確認後"]
  judge_checks:
    - id: "inventory"
      desc: "操作前盤點現狀（數量、類型）"
    - id: "reversible"
      desc: "變更有紀錄，理論上可回退"
    - id: "exclude-system-files"
      desc: "明確排除系統隱藏檔（.DS_Store 等）"
