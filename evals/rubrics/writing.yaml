# Writing skill 評分 rubric
# 來源：skills/writing/eval_examples.md「判斷標準」表
rubric:
  skill: "writing"
  source: "skills/writing/eval_examples.md"
  version: 1
  min_auto_pass_ratio: 0.5
  auto_checks:
    - id: "conclusion-first"
      desc: "結論先行、重點明確（前 80 行內）"
      scope: "head"
      any_markers: ["建議", "結論", "摘要"]
    - id: "structure"
      desc: "具備決策支援（比較 / 風險 / 下一步）"
      scope: "full"
      any_markers: ["建議", "下一步", "風險", "比較", "方案"]
  judge_checks:
    - id: "length-bound"
      desc: "篇幅在指定限制內（未超 20%）"
    - id: "tone"
      desc: "台灣商業用語、口語化，無翻譯腔/學術腔"
    - id: "faithful"
      desc: "嚴格遵照大綱，不自行擴充未被要求的章節"
