# 權限策略 PERMISSIONS.yaml
# 所有動作分為 allow / ask / deny 三級

permissions:
  # === 允許直接執行 ===
  allow:
    - read_project_files       # 讀取 project 內任何檔案
    - web_search               # 網頁搜尋
    - file_search              # 檔案內容搜尋
    - write_drafts             # 寫入 outputs/drafts/
    - write_logs               # 寫入 logs/ 下任何紀錄
    - git_commit_checkpoint    # git commit（僅 checkpoint 用途）
    - create_output_files      # 在 outputs/ 建立新檔案
    - read_memory              # 讀取 memory/ 下的內容
    - create_task_card         # 建立新的 Task Card（已驗證：8 筆歷史任務全部立即 approve → 升為 allow）
    - mcp_github_read          # MCP GitHub 讀取類（search_*, list_*, get_*, pull_request_read, issue_read）— web session 預載

  # === 需要人工確認 ===
  ask:
    - modify_skills            # 建立或修改 skills/ 下的檔案
    - modify_system_rules      # 修改 system/ 下的規則檔
    - write_long_term_memory   # 寫入 memory/ 下的長期知識
    - write_reports            # 寫入 outputs/reports/（正式輸出）
    - install_packages         # 安裝任何套件
    - modify_claude_md         # 修改 CLAUDE.md
    - mcp_github_write_comment # MCP GitHub 留言類（add_issue_comment, add_reply_to_pr_comment, add_comment_to_pending_review）
    - mcp_github_write_pr      # MCP GitHub PR 寫入（create_pull_request, update_pull_request, pull_request_review_write）
    - mcp_github_write_file    # MCP GitHub 檔案寫入（create_or_update_file, push_files）

  # === 禁止 ===
  deny:
    - shell_delete             # rm / rmdir / 任何刪除操作
    - send_email               # 直接發送 email
    - send_message_external    # 直接發送外部訊息（LINE/Telegram/Slack）
    - publish_content          # 直接發布內容到任何平台
    - modify_production_data   # 直接修改正式資料來源
    - execute_payment          # 任何金流操作
    - auto_write_memory        # 自動寫入長期記憶（未經確認）
    - spawn_background_process # 啟動背景程序
    - git_force_push           # git push --force / -f（permissions_guard.py 已實作攔截；2026-05-25 A02 補列以修補規則漂移）
    - mcp_github_merge         # MCP GitHub 合併 PR（merge_pull_request, enable_pr_auto_merge）
    - mcp_github_delete        # MCP GitHub 刪除（delete_file）
    - mcp_github_force_branch  # MCP GitHub 分支變更（fork_repository、create_branch on protected refs）

# === 風險等級對應 ===
risk_levels:
  low:
    description: "純讀取、分析、草稿產出"
    auto_execute: true
    approval_needed: false

  medium:
    description: "涉及檔案修改、知識庫更新"
    auto_execute: false
    approval_needed: true
    approval_type: "inline_confirm"  # 在對話中確認即可

  high:
    description: "涉及外部動作、正式輸出、資料變更"
    auto_execute: false
    approval_needed: true
    approval_type: "explicit_review"  # 需明確審閱草稿後確認

  critical:
    description: "涉及金流、刪除、對外發送"
    auto_execute: false
    approval_needed: true
    approval_type: "deny_by_default"  # 預設拒絕，需額外授權
