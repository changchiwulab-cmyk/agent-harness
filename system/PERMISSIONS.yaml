# 權限策略 PERMISSIONS.yaml
# 所有動作分為 allow / ask / deny 三級

permissions:
  # === 允許直接執行 ===
  allow:
    - read_project_files       # 讀取 project 內任何檔案
    - web_search               # 網頁搜尋
    - file_search              # 檔案內容搜尋
    - write_drafts             # 寫入 outputs/drafts/
    - write_logs               # 寫入 logs/ 下任何紀錄
    - git_commit_checkpoint    # git commit（僅 checkpoint 用途）
    - create_output_files      # 在 outputs/ 建立新檔案
    - read_memory              # 讀取 memory/ 下的內容
    - create_task_card         # 建立新的 Task Card（已驗證：8 筆歷史任務全部立即 approve → 升為 allow）

  # === 需要人工確認 ===
  ask:
    - modify_skills            # 建立或修改 skills/ 下的檔案
    - modify_system_rules      # 修改 system/ 下的規則檔
    - write_long_term_memory   # 寫入 memory/ 下的長期知識
    - write_reports            # 寫入 outputs/reports/（正式輸出）
    - install_packages         # 安裝任何套件
    - modify_claude_md         # 修改 CLAUDE.md

  # === 禁止 ===
  deny:
    - shell_delete             # rm -r/-f、rmdir、shred、find -delete 等高破壞性刪除（單檔 rm 由模型層自律）
    - send_email               # 直接發送 email
    - send_message_external    # 直接發送外部訊息（LINE/Telegram/Slack）
    - publish_content          # 直接發布內容到任何平台
    - modify_production_data   # 直接修改正式資料來源
    - execute_payment          # 任何金流操作
    - auto_write_memory        # 自動寫入長期記憶（未經確認）
    - spawn_background_process # 啟動背景程序
    - git_force_push           # git push --force（保護遠端歷史與正式資料）

# === deny 執法層級 ===
# runtime = scripts/permissions_guard.py（PreToolUse hook）有對應攔截規則
# model   = 無可靠 shell 簽名，靠模型自律 + 人工審核把關
# 三方同步（本清單 ↔ 本區段 ↔ guard DENY_RULES）由 scripts/test_permissions_guard.py
# 的 sync 測試在 CI 保證。
deny_enforcement:
  shell_delete: runtime
  send_email: runtime
  send_message_external: runtime
  publish_content: runtime
  modify_production_data: model
  execute_payment: runtime
  auto_write_memory: runtime
  spawn_background_process: runtime
  git_force_push: runtime

# === 風險等級對應 ===
risk_levels:
  low:
    description: "純讀取、分析、草稿產出"
    auto_execute: true
    approval_needed: false

  medium:
    description: "涉及檔案修改、知識庫更新"
    auto_execute: false
    approval_needed: true
    approval_type: "inline_confirm"  # 在對話中確認即可

  high:
    description: "涉及外部動作、正式輸出、資料變更"
    auto_execute: false
    approval_needed: true
    approval_type: "explicit_review"  # 需明確審閱草稿後確認

  critical:
    description: "涉及金流、刪除、對外發送"
    auto_execute: false
    approval_needed: true
    approval_type: "deny_by_default"  # 預設拒絕，需額外授權

# === Deterministic 強制點（PreToolUse hooks；20260609-001 新增）===
# 多數 allow/ask/deny 仍靠 prompt 自我約束；下列由 .claude/settings.json 註冊的 hook 抬到 runtime 硬制：
enforcement:
  - guard: "scripts/permissions_guard.py"
    matcher: "Bash"
    enforces: "deny 清單的 shell 簽章（rm -rf / sendmail / 外部 webhook / 金流 API / git force-push）"
  - guard: "scripts/task_card_guard.py"
    matcher: "Write|Edit|MultiEdit|NotebookEdit"
    enforces: "硬規則 1（v2, 20260710-002）— 寫入 outputs/reports/ 的新正式產出，必須綁定 active task（state/active_task.yaml，由 scripts/active_task.py --set 維護）：卡片存在、status ∉ {done,failed}、expected_output 精確路徑與目標一致；否則 block。檔名巧合與已結案卡不再授權"
  - guard: "scripts/failure_counter.py --hook"
    matcher: "Bash + Write|Edit"
    enforces: "硬規則 3 — 同一 task_id 連續失敗達 3 次後，後續工具呼叫一律 block，直到人工 --reset"
  - guard: "scripts/allowed_tools_guard.py"
    matcher: "Bash + Write|Edit|MultiEdit|NotebookEdit"
    enforces: "Task Card allowed_tools 白名單當下強制（20260712-P11）— 有 active task 時，寫入目標路徑映射到 gate_check L2 同一詞彙的工具名、Bash 分類為 run_tests/bash，白名單外即 block；idle 全放行（不做全域綁卡，20260710-001 §三-6）；治理控制面（tasks/、state/、logs/ 寫入；harness 協定 CLI；git checkpoint/push）豁免；輸入層 fail-open（寫入 matcher 的 fail-closed 由 task_card_guard 專責，見 SECURITY.md）"
# 殘餘 prompt-only（誠實標註）：硬規則 1 的「drafts/ 探索」與 ask 等級的人工確認仍依賴 Claude 遵循 CLAUDE.md。
