# Claude Code 原生功能重疊度 — 人工 input
#
# plan §5.3 M4 指標的來源：每季由人工依當前 Claude Code 規範重新評估。
# 數值來源見 outputs/drafts/2026-05-09_v3_extraction_plan.md §4.1 表 A。
#
# 警訊閾值（plan §5.3）：aggregate > 50% → 重構觸發點。

reviewed_on: "2026-05-09"
reviewer: "agent-harness owner"
revisit_trigger: "每季度；或 Claude Code 主版本升級時"
revisit_interval_days: 90   # R9：把「每季度」量化；governance_metrics.py M4 據此偵測 reviewed_on 是否過季

aggregate_estimate_pct: 30   # plan §Context 的 baseline；A01 §4.1 表 A 9 模組逐項評估後仍與此 baseline 同量級

# 每模組明細（A01 §4.1 表 A）
modules:
