# Approval Policy — 批准流程規則
# 定義哪些動作需要人工批准、怎麼批准、超時怎麼處理。
# 與 PERMISSIONS.yaml 互補：PERMISSIONS 管「能不能」，本檔管「怎麼核准」。

triggers:
  # --- 自動觸發批准的條件 ---
  - condition: "risk_level >= high"
    action: "輸出到 outputs/drafts/，等待人工確認"
    method: human_confirm

  - condition: "對外動作（email / 發文 / API call）"
    action: "產出草稿，不直接執行"
    method: draft_first

  - condition: "修改 system/ 目錄下任何檔案"
    action: "列出變更差異，等待確認"
    method: human_confirm

  - condition: "修改 skills/ 目錄下任何檔案"
    action: "列出變更差異，等待確認"
    method: human_confirm

  - condition: "寫入 memory/ 長期記憶"
    action: "列出擬寫入內容，等待確認"
    method: human_confirm

  - condition: "建立新的 Task Card（risk_level >= high）"
    action: "展示 goal + definition_of_done，等待確認"
    method: human_confirm
    note: "low/medium risk Task Card 已升為 allow（見 PERMISSIONS.yaml）"

  - condition: "寫入正式報告（outputs/reports/）"
    action: "先存 drafts/，確認後移至 reports/"
    method: draft_first

approval_methods:
  human_confirm:
    description: "直接向使用者展示內容並等待明確同意"
    timeout: "不設超時，持續等待"
    on_no_response: "停留在等待狀態，不自動執行"

  draft_first:
    description: "先產出草稿到 outputs/drafts/，通知使用者有草稿待審"
    timeout: "不設超時，草稿保留直到被人工處理"
    on_no_response: "草稿保留，不自動發布或移動"

escalation:
  - condition: "批准等待中發現新風險"
    action: "追加風險說明到草稿，重新通知使用者"
  - condition: "同一任務產生 3 次以上批准請求"
    action: "暫停任務，建議使用者重新評估任務範圍"

# === 批准紀錄格式（R1: 20260529-004 新增）===
# 定義批准動作如何被記錄、寫到哪。
# 來源權威（source of truth）：logs/approvals/ 為「全任務」核准 audit trail 的唯一權威；
# EXECUTION_LOG_SCHEMA.yaml 的 execution_log.approvals[] 僅為「該 run」鏡像，不得當權威。
# RETRO_FLOW §1 的「核准紀錄」資料源即指此目錄。模板見 logs/approvals/APPROVAL_LOG_TEMPLATE.yaml。
approval_record:
  location: "logs/approvals/"
  filename_pattern: "YYYY-MM-DD_[task_id]_approval.yaml"   # 純 YAML，便於 CI lint
  container_key: "approval_records"                         # 檔案頂層為此 list，可批次記錄同一任務的多筆批准
  required_fields:
    - approval_id        # APR-YYYYMMDD-NNN
    - task_id            # 對應 Task Card
    - date               # YYYY-MM-DD
    - action             # 被批准的動作
    - approval_method    # human_confirm | draft_first
    - status             # approved | rejected | superseded
    - approved_by        # 批准者（通常 human）
  optional_fields:
    - risk_level         # low | medium | high | critical
    - rationale          # 批准理由
    - linked_run         # 對應 logs/runs/ 的 run_id（可空）
  enforced_by: "scripts/check_spec_consistency.rb（R2: 20260529-005 起納入 CI lint）"
