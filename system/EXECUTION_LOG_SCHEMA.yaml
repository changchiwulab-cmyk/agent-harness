# Execution Log Schema
#
# === 使用範圍（2026-04-24 依 Decision Log D006 收斂）===
# 非所有任務都需寫入 logs/runs/。僅下列情境需使用本 schema 做詳細記錄：
#   1. status = failed（任務失敗）
#   2. status = partial（部分完成）
#   3. risk_level >= high 的任務（需 4 層 gate 完整紀錄）
#   4. checkpoints >= 3（多階段複雜任務，需分段溯源）
# 其他 happy-path 任務僅寫 logs/AUDIT_LOG.md 即可。
#
# 理由：近 5 筆任務零失敗零 partial，AUDIT_LOG 已充分；schema 對失敗後 post-mortem
# 與高風險溯源最有價值，不應對短小任務強加儀式負擔。
# 參見 memory/active_projects/agent-harness/decisions/20260424-D006_execution-log-scope.yaml
#
# === Schema 定義 ===
# 符合上述條件的任務完成後，依此 schema 寫入 logs/runs/

execution_log:
  run_id: "RUN-YYYYMMDD-###"        # 唯一識別碼
  task_id: ""                         # 對應的 Task Card ID
  skill_type: ""                      # research / writing / ops / review
  started_at: "YYYY-MM-DD HH:MM"
  ended_at: "YYYY-MM-DD HH:MM"
  status: ""                          # completed / failed / partial / cancelled

  # --- 執行細節 ---
  tools_used:
    - tool: ""                        # 工具名稱
      call_count: 0                   # 呼叫次數
      # 範例：
      # - tool: web_search
      #   call_count: 2

  checkpoints:
    - commit: ""                      # git commit hash
      stage: ""                       # 階段描述
      # 範例：
      # - commit: "abc1234"
      #   stage: "完成資料蒐集"

  # --- 成本估算 ---
  token_estimate:
    input: 0
    output: 0
    total: 0
    source: ""                        # dashboard_measured（API dashboard 實測）/ rule_estimated（規則估算）/ not_recorded；R6 新增，標示數據可信度

  # --- 審批紀錄 ---
  approvals:
    - action: ""                      # 需要批准的動作
      status: ""                      # approved / rejected / pending
      approved_by: "human"
      timestamp: ""

  # --- 結果 ---
  output_path: ""                     # 產出檔案路徑（outputs/drafts/ 或 outputs/reports/）
  error_summary: ""                   # 若失敗，簡述原因
  gate_results:
    schema_check: ""                  # pass / fail
    rule_check: ""                    # pass / fail
    completion_check: ""              # pass / fail
    risk_check: ""                    # pass / fail

  # --- 情境工程快照（M3；context engineering）---
  # 長任務（checkpoints >= 3 或觸發壓縮）時記錄，供溯源「壓縮當下保留了什麼」。
  # 詳見 system/CONTEXT_ENGINEERING.md
  context_snapshot:
    compaction_triggered: false       # 是否做過 context 壓縮（原生或主動 20 輪摘要）
    note_path: ""                     # 結構化筆記/handoff note 路徑（如 memory/active_projects/<p>/notes/...）
    retained_summary: ""              # 壓縮時保留的關鍵狀態一句話

  # --- 執行 trace（M6；鬆對齊 OpenTelemetry GenAI gen_ai.*）---
  # 選填；high-risk 或需 trajectory 溯源時逐步記錄。對照見 docs/otel-genai-mapping.md
  trace:
    - step: 0                          # 步序
      type: ""                        # tool_call / reasoning / subagent（gen_ai.operation.name）
      tool: ""                        # 工具名（gen_ai.tool.name）
      tokens: 0                       # 該步 token（gen_ai.usage.*）
      latency_ms: 0                   # 延遲毫秒
      outcome: ""                     # ok / error
      # 範例：
      # - step: 1
      #   type: tool_call
      #   tool: web_search
      #   tokens: 1200
      #   latency_ms: 3400
      #   outcome: ok

  # --- 備註 ---
  notes: ""
